services:
  inference-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: methodology-inference-server:latest
    container_name: methodology-inference-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HF_HOME: /models/hf-cache
      TRANSFORMERS_CACHE: /models/hf-cache
      HUGGINGFACE_HUB_CACHE: /models/hf-cache
    volumes:
      - ./model-cache:/models/hf-cache
    gpus: all
    restart: unless-stopped
