services:
  inference-server:
    build:
      context: ./inference_server
      dockerfile: Dockerfile
    image: methodology-inference-server:latest
    container_name: methodology-inference-server
    ports:
      - "8000:8000"
    env_file:
      - ./inference_server/.env
    environment:
      HF_HOME: /models/hf-cache
      TRANSFORMERS_CACHE: /models/hf-cache
      HUGGINGFACE_HUB_CACHE: /models/hf-cache
    volumes:
      - ./inference_server/model-cache:/models/hf-cache
    gpus: all
    restart: unless-stopped

  go-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: methodology-go-api:latest
    container_name: methodology-go-api
    command: ["serve"]
    ports:
      - "8090:8090"
    environment:
      APP_HTTP_ADDR: ":8090"
      INFERENCE_BASE_URL: "http://inference-server:8000"
      INFERENCE_TIMEOUT_SECONDS: "600"
    depends_on:
      - inference-server
    restart: unless-stopped
